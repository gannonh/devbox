# Release workflow for @gannonh/devbox.
#
# Single trigger: manual dispatch (workflow_dispatch) with:
#   version:  full semver (e.g. "1.2.0"), or empty for patch bump from last tag
#   dry_run:  boolean, default false — run everything except npm publish and
#             the tag/release creation
#
# Publish-first ordering. The git tag and GitHub Release are created ONLY after
# `npm publish` succeeds. A failed publish leaves no tag and no release page,
# so there is no "release" pointing at an unpublished version.
#
# Version resolution:
#   - If version input is provided, use it verbatim (strip leading 'v').
#   - If empty, resolve the last tag via `git tag --list 'v*' --sort=-v:refname | head -1`
#     and patch-bump it.
#   - If no prior tag exists and version is empty, error (first release needs an
#     explicit version).
#
# Tag is the source of truth. CI syncs package.json + package-lock.json version
# to the tag/target, not the other way around. Both manifests are committed so
# re-runs at the same version never hit an empty commit.
#
# NPM_TOKEN is a repository secret configured in GitHub repo settings.

name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Full semver (e.g. 1.2.0). Empty = patch bump from last tag.'
        required: false
        type: string
      dry_run:
        description: 'Run everything except npm publish and tag/release creation'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need full history + tags for version resolution

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org/'

      - name: Install dependencies
        run: npm ci

      - name: Resolve target version
        id: version
        run: |
          set -euo pipefail
          INPUT_VERSION="${{ github.event.inputs.version }}"

          if [ -n "$INPUT_VERSION" ]; then
            # Explicit version: strip leading 'v' if present.
            TARGET_VERSION="${INPUT_VERSION#v}"
            echo "Manual dispatch with explicit version: $TARGET_VERSION"
          else
            # Empty version: patch-bump from last tag.
            LAST_TAG=$(git tag --list 'v*' --sort=-v:refname | head -1)
            if [ -z "$LAST_TAG" ]; then
              echo "::error::No prior tag found. Provide an explicit version for the first release."
              exit 1
            fi
            LAST_VERSION="${LAST_TAG#v}"
            echo "Last tag: $LAST_TAG (version $LAST_VERSION)"

            # Patch bump: increment the last numeric segment.
            IFS='.' read -r MAJOR MINOR PATCH <<< "$LAST_VERSION"
            PATCH=$((PATCH + 1))
            TARGET_VERSION="${MAJOR}.${MINOR}.${PATCH}"
            echo "Patch-bumped to: $TARGET_VERSION"
          fi

          echo "target_version=$TARGET_VERSION" >> "$GITHUB_OUTPUT"
          echo "Target version: $TARGET_VERSION"

      - name: Sync version in package.json + package-lock.json
        run: |
          set -euo pipefail
          TARGET_VERSION="${{ steps.version.outputs.target_version }}"
          # npm version edits package.json AND package-lock.json in place
          # without creating a git tag. Both are committed below so re-runs at
          # the same version never hit an empty-commit failure.
          npm version "$TARGET_VERSION" --no-git-tag-version --allow-same-version
          echo "Synced package.json + package-lock.json to $TARGET_VERSION"

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      # --- Publish ------------------------------------------------------------
      # PUBLISH BEFORE TAG/RELEASE. If this step fails, the tag and GitHub
      # Release are never created, so there is no release pointing at an
      # unpublished version.
      - name: Publish to npm
        if: ${{ github.event.inputs.dry_run != true }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          TARGET_VERSION="${{ steps.version.outputs.target_version }}"
          echo "Publishing @gannonh/devbox@$TARGET_VERSION"
          npm publish --access public

      # --- Commit, tag, and GitHub Release ------------------------------------
      # Only after publish succeeds (or dry_run). Each step gates on the
      # previous step's success() so a publish failure leaves no tag/release.
      - name: Commit version bump and create tag
        id: tag
        if: ${{ success() && github.event.inputs.dry_run != true }}
        run: |
          set -euo pipefail
          TARGET_VERSION="${{ steps.version.outputs.target_version }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add package.json package-lock.json
          git commit -m "chore(release): v${TARGET_VERSION}"
          git tag "v${TARGET_VERSION}"
          git push origin HEAD:main
          git push origin "v${TARGET_VERSION}"
          echo "Pushed commit + tag v${TARGET_VERSION}"
          echo "tag=v${TARGET_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: ${{ success() && github.event.inputs.dry_run != true }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TARGET_VERSION="${{ steps.version.outputs.target_version }}"
          cat > /tmp/release-notes.md <<'EOF'
          ## Install

          ```sh
          npx @gannonh/devbox init
          ```

          or

          ```sh
          npm install -g @gannonh/devbox
          devbox init
          ```
          EOF
          gh release create "v${TARGET_VERSION}" \
            --title "v${TARGET_VERSION}" \
            --notes-file /tmp/release-notes.md
          echo "Created GitHub Release v${TARGET_VERSION}"

      - name: Dry-run summary
        if: ${{ github.event.inputs.dry_run == true }}
        run: |
          TARGET_VERSION="${{ steps.version.outputs.target_version }}"
          echo "::notice::Dry run complete. Would have published @gannonh/devbox@$TARGET_VERSION, created tag v${TARGET_VERSION}, and a GitHub Release."
